<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Reflection - Letters Across Time</title>
    <link rel="icon" href="images/logo.png">
    <link href="css/reflection.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">
</head>

<body class="reflection-result">
    <div class="bg-wrapper">
        <img src="images/hamilbgHD.png" alt="Background" class="bg-image">
    </div>

    <header class="site-header">
        <div class="site-title-container">
            <img src="images/logo.png" alt="Logo" style="width: 40px; margin-left: 20px;"> 
            <span class="site-title">Letters Across Time</span>
        </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="eTSOT.html">The Story of Tonight</a>
            <a href="timeline_eliza.html">Helpless</a>
            <a href="firstburn/eFB.html">First Burn</a>
            <a href="uptown_eliza.html">It's Quiet Uptown</a>
            <a href="legacy_eliza.html">Legacy</a>
            <a href="e.yourshot.html">Your Shot</a>
            <a href="e.reflection-result.html" class="active">Reflections</a>
            <a href="e.yourcharacter.html">Your Character</a>        
        </nav>
    </header>

    <main class="result-container">
        <section class="user-reflection-section">
            <h1 class="calligraphy-title">Your Reflection</h1>
            <div class="main-reflection-box" id="latestReflection">
                <p>Loading your reflection...</p>
            </div>
            <button class="prev-reflections-btn">see previous reflections..</button>
        </section>

        <section class="others-reflection-section">
            <h2 class="calligraphy-title secondary">reflections from other users...</h2>
            <div class="reflections-grid" id="anonymousGrid">
                </div>
        </section>

    <div id="editModal" style="display:none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);">
    <div class="parchment-paper" style="margin: 10% auto; width: 80%; max-width: 600px; padding: 20px;">
        <h2 class="calligraphy-title">Edit Your Letter</h2>
        <textarea id="editTextarea" style="width: 100%; height: 200px; background: transparent; border: none; font-family: 'Italianno', cursive; font-size: 1.5rem;"></textarea>
        <button id="saveEditBtn" class="submit-button">Save Changes</button>
        <button onclick="document.getElementById('editModal').style.display='none'" class="prev-reflections-btn">Cancel</button>
    </div>
</div>

</main>

    <div class="footer-bar">
        <div class="qr-code">
            <p>Gesite, Ongkeko</p>
        </div>
        <p class="copyright">Copyright © 2025 Letters Across Time</p>
    </div>

    <script src="js/reflectionresult.js"></script>
</body>
</html>
