<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Reflection - Letters Across Time</title>
    <link rel="icon" href="images/logo.png">
    <link href="css/reflections.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-wrapper">
        <img src="images/hamilbgHD.png" alt="Background" class="bg-image">
    </div>

    <header class="site-header">
        <div class="site-title-container">
            <img src="images/logo.png" alt="Scroll Icon" style="width: 40px; margin-left: 20px;"> 
            <span class="site-title">Letters Across Time</span>
        </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="eTSOT.html">The Story of Tonight</a>
            <a href="timeline_eliza.html">Helpless</a>
            <a href="firstburn/eFB.html">First Burn</a>
            <a href="uptown_eliza.html">It's Quiet Uptown</a>
            <a href="legacy_eliza.html">Legacy</a> 
            <a href="e.yourshot.html">Your Shot</a>
            <a href="e.reflection-result.html" class="active">Reflections</a>
            <a href="e.yourcharacter.html">Your Character</a>
        </nav>
    </header>

    <main class="result-container">
        <h1 class="calligraphy-title">Your Reflection</h1>
        <div class="main-reflection-box" id="latestReflection">
            <p>Loading your story...</p>
        </div>

        <div class="crud-actions">
            <button id="editBtn" class="crud-btn edit-btn">
                <img src="images/quill.jpeg" alt="Quill" class="btn-icon"> Rewrite History
            </button>
            <button class="prev-reflections-btn">see previous reflections..</button>
            <button id="burnBtn" class="crud-btn burn-btn">
                <img src="images/fire.jpeg" alt="Flame" class="btn-icon"> Burn Letter
            </button>
        </div>

        <section class="others-reflection-section">
            <h2 class="calligraphy-title secondary" style="font-size: 3rem;">reflections from other users...</h2>
            <div class="reflections-grid" id="anonymousGrid"></div>
        </section>
    </main>

    <footer class="footer-bar">
        <p>Gesite, Ongkeko</p>
        <p class="copyright">Copyright © 2026 Letters Across Time</p>
    </footer>

    <script src="js/reflectionresult.js"></script>
</body>
</html>
